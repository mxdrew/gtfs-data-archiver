services:
  gtfs-archiver:
    build: .
    container_name: gtfs-data-archiver
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_KEY=${API_KEY}
      - HOST=${HOST}
      - CONTAINER_NAME=${CONTAINER_NAME}
      - REMOTE_HOST_JSONL_DIR=${REMOTE_HOST_JSONL_DIR}
      - LOCAL_BASE_WINDOWS=${LOCAL_BASE_WINDOWS}
      - LOCAL_BASE_WSL=${LOCAL_BASE_WSL}
      - SYNC_TIMEZONE=${SYNC_TIMEZONE}
      - AGENCY_NAME=${AGENCY_NAME}
      - BASE_URL=${BASE_URL}
      - GTFS_URL=${GTFS_URL}
      - ENABLE_ROUTE_STREAMS=${ENABLE_ROUTE_STREAMS}
      - ENABLE_FACILITY_STREAMS=${ENABLE_FACILITY_STREAMS}
      - ENABLE_ENHANCED_STREAMS=${ENABLE_ENHANCED_STREAMS}
      - BASE_STREAMS=${BASE_STREAMS}
      - ROUTE_STREAMS=${ROUTE_STREAMS}
      - SNAPSHOT_EPS=${SNAPSHOT_EPS}
      - ENHANCED_POLL_INTERVAL_SECONDS=${ENHANCED_POLL_INTERVAL_SECONDS}
      - VEHICLES_ENHANCED_URL=${VEHICLES_ENHANCED_URL}
      - ALERTS_ENHANCED_URL=${ALERTS_ENHANCED_URL}
      - TRIPS_ENHANCED_URL=${TRIPS_ENHANCED_URL}
      - DEFAULT_BATCH_SIZE=${DEFAULT_BATCH_SIZE}
      - LOG_LEVEL=${LOG_LEVEL}
      - ARCHIVE_ZSTD_LEVEL=${ARCHIVE_ZSTD_LEVEL}
      - ROUTE_LOOKUP_LIMIT=${ROUTE_LOOKUP_LIMIT}
      - STOP_LOOKUP_LIMIT=${STOP_LOOKUP_LIMIT}
      - FACILITY_LOOKUP_LIMIT=${FACILITY_LOOKUP_LIMIT}
      - SYNC_MODE=${SYNC_MODE}
      - CUSTOM_SYNC_TIMES=${CUSTOM_SYNC_TIMES}
    volumes:
      - ./data:/app/data