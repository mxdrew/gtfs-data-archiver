const CAL_COLORS=['#21262d','#0e4429','#006d32','#26a641','#39d353'];
const MAIN_STREAMS=new Set([
  'vehicles','alerts','predictions','stop_events',
  'schedules','services','shapes','trips','lines',
  'routes','route_patterns','facilities','stops','live_facilities',
  'VehiclePositions','Alerts','TripUpdates',
]);
function streamGroup(s){
  if(s.toLowerCase().includes('enhanced'))return'enhanced';
  if(MAIN_STREAMS.has(s))return'main';
  return'custom';
}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_LABELS=['Su','M','T','W','Th','F','Sa'];
const TIPS=['No data','<500 rows','500–2k rows','2k–10k rows','≥10k rows'];

const tt=document.getElementById('tt');
function showTip(e,html){tt.innerHTML=html;tt.classList.add('show');moveTip(e);}
function moveTip(e){
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-210)+'px';
  tt.style.top=Math.max(e.clientY-30,4)+'px';
}
function hideTip(){tt.classList.remove('show');}

function isoDate(dt){
  return [dt.getFullYear(),String(dt.getMonth()+1).padStart(2,'0'),
    String(dt.getDate()).padStart(2,'0')].join('-');
}
function addDays(dt,n){const d=new Date(dt);d.setDate(d.getDate()+n);return d;}
function sundayOf(dt){const d=new Date(dt);d.setDate(d.getDate()-d.getDay());return d;}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function level(rc){
  if(rc===undefined||rc===null||rc===0)return 0;
  if(rc<500)return 1;if(rc<2000)return 2;if(rc<10000)return 3;return 4;
}

let activeYear='';
let activeStream='All';

function buildAgency(ag){
  const days={};
  if(activeStream==='All'){
    Object.values(ag.streams||{}).forEach(sd=>{
      Object.entries(sd).forEach(([ds,rc])=>{
        if(ds.startsWith(activeYear))days[ds]=(days[ds]||0)+rc;
      });
    });
  }else{
    Object.entries(((ag.streams||{})[activeStream])||{}).forEach(([ds,rc])=>{
      if(ds.startsWith(activeYear))days[ds]=rc;
    });
  }
  const dayCount=Object.keys(days).length;

  // Skip agencies with no data in this year
  if(!ag.is_rt||dayCount===0)return null;

  const block=document.createElement('div');
  block.className='agency-block';

  const hdr=document.createElement('div');
  hdr.className='agency-header';
  const nameEl=ag.url
    ? `<a class="agency-name" href="${ag.url}" target="_blank" rel="noopener">${ag.name}</a>`
    : `<span class="agency-name">${ag.name}</span>`;
  hdr.innerHTML=`<span class="agency-code">${ag.agency}</span><span style="color:#8b949e"> — </span>${nameEl}<span class="day-count">(${dayCount} ${dayCount===1?'day':'days'} in ${activeYear})</span>`;
  block.appendChild(hdr);

  const yearStart=new Date(parseInt(activeYear),0,1);
  const yearEnd=new Date(parseInt(activeYear),11,31);
  const calStart =sundayOf(yearStart);
  const calEndDay=yearEnd.getDay();
  const calEnd=addDays(yearEnd,calEndDay===6?0:6-calEndDay);

  const weeks=[];let week=[],cur=new Date(calStart);
  while(cur<=calEnd){
    week.push(new Date(cur));
    if(cur.getDay()===6){weeks.push(week);week=[];}
    cur=addDays(cur,1);
  }
  if(week.length)weeks.push(week);

  // Month row
  const monthRow=document.createElement('div');
  monthRow.className='month-row';
  weeks.forEach(wk=>{
    const span=document.createElement('span');
    span.className='month-lbl';
    const firstOfMonth=wk.find(x=>x.getDate()===1&&x>=yearStart&&x<=yearEnd);
    if(firstOfMonth)span.textContent=MONTHS[firstOfMonth.getMonth()];
    else if(wk===weeks[0]){const iy=wk.find(x=>x>=yearStart);if(iy)span.textContent=MONTHS[iy.getMonth()];}
    monthRow.appendChild(span);
  });

  const outer=document.createElement('div');outer.className='cal-outer';
  const grid =document.createElement('div');grid.className='cal-grid';

  const dowCol=document.createElement('div');dowCol.className='dow-col';
  DOW_LABELS.forEach(l=>{
    const s=document.createElement('div');s.className='dow-lbl';s.textContent=l;
    dowCol.appendChild(s);
  });
  grid.appendChild(dowCol);

  const weeksDiv=document.createElement('div');weeksDiv.className='cal-weeks';
  weeks.forEach(wk=>{
    const col=document.createElement('div');col.className='week-col';
    wk.forEach(day=>{
      const ds=isoDate(day);
      const cell=document.createElement('div');cell.className='dc';
      const inYear=day>=yearStart&&day<=yearEnd;
      if(!inYear){cell.classList.add('dc-blank');}
      else{
        const rc=days[ds],lv=level(rc);
        cell.classList.add('dc'+lv);
        const dateFmt=day.toLocaleDateString('en-US',{month:'long'})+' '+ordinal(day.getDate())+', '+day.getFullYear();
        const rowStr=rc!==undefined?`${Number(rc).toLocaleString()} rows`:'No data';
        cell.addEventListener('mouseenter',e=>showTip(e,`<strong>${dateFmt}</strong><br>${rowStr}`));
        cell.addEventListener('mousemove',moveTip);
        cell.addEventListener('mouseleave',hideTip);
      }
      col.appendChild(cell);
    });
    weeksDiv.appendChild(col);
  });
  grid.appendChild(weeksDiv);

  // Legend — right-aligned, same width as scrollable calendar area
  const legend=document.createElement('div');
  legend.className='cal-legend';
  const less=document.createElement('span');less.textContent='Less';
  legend.appendChild(less);
  for(let i=0;i<=4;i++){
    const sq=document.createElement('span');
    sq.className='legend-sq';sq.style.background=CAL_COLORS[i];sq.title=TIPS[i];
    legend.appendChild(sq);
  }
  const more=document.createElement('span');more.textContent='More';
  legend.appendChild(more);

  outer.appendChild(monthRow);
  outer.appendChild(grid);
  outer.appendChild(legend);
  block.appendChild(outer);
  return block;
}

function renderAll(){
  const root=document.getElementById('cal-root');
  root.innerHTML='';
  let count=0;
  AGENCIES.forEach(ag=>{
    const el=buildAgency(ag);
    if(el){root.appendChild(el);count++;}
  });
  if(count===0){
    root.innerHTML='<p style="color:#8b949e;font-size:0.85rem">No realtime data captured for '+activeYear+'.</p>';
  }
}

function renderYearBar(){
  const bar=document.getElementById('yearBtns');
  bar.innerHTML='';
  const allYears=[...new Set(AGENCIES.flatMap(ag=>Object.keys(ag.days).map(d=>d.slice(0,4))))].sort();
  if(!activeYear)activeYear=allYears[allYears.length-1]||String(new Date().getFullYear());
  allYears.forEach(y=>{
    const btn=document.createElement('button');
    btn.className='year-btn'+(y===activeYear?' active':'');
    btn.textContent=y;
    btn.onclick=()=>{activeYear=y;renderYearBar();renderStreamBar();renderAll();setGridLayout();};
    bar.appendChild(btn);
  });
}

function renderStreamBar(){
  const groups={main:new Set(),enhanced:new Set(),custom:new Set()};
  AGENCIES.forEach(ag=>{
    Object.entries(ag.streams||{}).forEach(([s,sd])=>{
      if(Object.keys(sd).some(d=>d.startsWith(activeYear)))
        groups[streamGroup(s)].add(s);
    });
  });
  function fillBar(barId,streams,wrapId){
    const bar=document.getElementById(barId);
    bar.innerHTML='';
    if(wrapId){
      const wrap=document.getElementById(wrapId);
      if(!streams.length){wrap.style.display='none';return;}
      wrap.style.display='';
    }
    streams.forEach(s=>{
      const btn=document.createElement('button');
      btn.className='year-btn'+(s===activeStream?' active':'');
      btn.textContent=s;
      btn.onclick=()=>{activeStream=s;renderStreamBar();renderAll();setGridLayout();};
      bar.appendChild(btn);
    });
  }
  fillBar('streamMain',['All',...[...groups.main].sort()],null);
  fillBar('streamEnhanced',[...groups.enhanced].sort(),'sg-enhanced');
  fillBar('streamCustom',[...groups.custom].sort(),'sg-custom');
}

function setGridLayout(){
  const root=document.getElementById('cal-root');
  const blocks=Array.from(root.querySelectorAll('.agency-block'));
  if(!blocks.length)return;
  const maxW=Math.max(...blocks.map(b=>b.getBoundingClientRect().width));
  const avail=window.innerWidth-56;
  root.style.gridTemplateColumns=avail>=maxW*2+20?'repeat(2,max-content)':'max-content';
}

renderYearBar();
renderStreamBar();
renderAll();
setGridLayout();
window.addEventListener('resize',setGridLayout);
</script>
