name: gtfs-archiver

# 1. Define shared container settings in an ignored extension field
x-shared-base: &shared-base
  build: .
  restart: unless-stopped
  volumes:
    - ./data:/app/data

# 2. Define shared environment variables in an ignored extension field
x-shared-env: &shared-env
  SYNC_TIMEZONE: America/New_York
  ENABLE_BASE_STREAMS: "false"
  ENABLE_ROUTE_STREAMS: "false"
  ENABLE_SNAPSHOT_PULLS: "false"
  ENABLE_ENHANCED_STREAMS: "false"
  ENABLE_GTFS_STATIC: "true"
  LOG_LEVEL: warning
  DEFAULT_BATCH_SIZE: "25"
  ARCHIVE_ZSTD_LEVEL: "10"

services:
  mbta-archiver:
    <<: *shared-base
    container_name: mbta-data-archiver
    environment:
      <<: *shared-env
      AGENCY_NAME: MBTA
      GTFS_URL: https://cdn.mbta.com/MBTA_GTFS.zip

  brta-archiver:
    <<: *shared-base
    container_name: brta-data-archiver
    environment:
      <<: *shared-env
      AGENCY_NAME: BRTA
      GTFS_URL: https://data.trilliumtransit.com/gtfs/berkshire-ma-us/berkshire-ma-us.zip

  bat-archiver:
    <<: *shared-base
    container_name: bat-data-archiver
